<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente de Viagem</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Assistente de Viagem">
<script>
(function(){
  try {
    var manifest = {
      name: "Assistente de Viagem",
      short_name: "Assistente de Viagem",
      start_url: window.location.href,
      scope: window.location.href,
      display: "standalone",
      background_color: "#22262B",
      theme_color: "#22262B",
      icons: [
        { src: window.location.href.replace(/index\.html$/, "") + "icons/icon-192.png", sizes: "192x192", type: "image/png" },
        { src: window.location.href.replace(/index\.html$/, "") + "icons/icon-512.png", sizes: "512x512", type: "image/png" }
      ]
    };
    var blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('link');
    link.rel = 'manifest';
    link.href = url;
    document.head.appendChild(link);
  } catch(e) { console.error('Falha ao montar manifest dinamico:', e); }
})();
</script>

<meta name="theme-color" content="#22262B">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header>
    <span class="eyebrow">Diário de despesas &middot; viagens a trabalho</span>
    <h1>Assistente de Viagem</h1>
    <p>Fotografe o cupom. O agente identifica o tipo, a data e o valor.</p>
  </header>

  <div id="trip-bar"></div>
  <div id="settings-panel" style="display:none;"></div>
  <div style="margin-bottom:16px;"><button class="link-btn" onclick="toggleSettings()">⚙ Cotas por região</button></div>

  <div class="context-label" id="context-label"></div>
  <div class="totals" id="totals"></div>
  <div class="total-geral">
    <span class="label" id="total-geral-label">Total</span>
    <span class="value" id="total-geral-valor">R$ 0,00</span>
  </div>

  <div class="dropzone" id="dropzone">
    <div class="icon">📎</div>
    <div class="main">Enviar cupom fiscal</div>
    <div class="sub">Toque para fotografar ou escolher uma imagem</div>
  </div>
  <input type="file" id="file-input" accept="image/*" capture="environment">

  <div class="section-label">Despesas catalogadas</div>
  <div id="lista"></div>

  <div id="history-section"></div>
</div>

<script src="app.js"></script>
</body>
</html>
